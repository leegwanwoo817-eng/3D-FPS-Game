<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before {
            width: 2px;
            height: 10px;
            left: 50%;
            top: -10px;
            transform: translateX(-50%);
        }
        #crosshair::after {
            width: 10px;
            height: 2px;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
        }
        #health {
            top: 20px;
            left: 20px;
        }
        #score {
            top: 20px;
            right: 20px;
        }
        #ammo {
            bottom: 20px;
            left: 20px;
        }
        #instructions {
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        #gameOver h1 {
            font-size: 48px;
            margin: 0;
        }
        #gameOver p {
            font-size: 24px;
            margin: 20px 0;
        }
        #gameOver button {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #gameOver button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="crosshair"></div>
    
    <div id="ui">
        <div id="health">❤️ Health: <span id="healthValue">100</span>/100</div>
        <div id="score">Score: <span id="scoreValue">0</span></div>
        <div id="ammo">💥 Ammo: <span id="ammoValue">30</span>/30</div>
        <div id="instructions">
            WASD - Move | Mouse - Look | Click - Shoot<br>
            ESC - Release Mouse
        </div>
    </div>
    
    <div id="gameOver">
        <h1 id="gameOverTitle">GAME OVER!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
